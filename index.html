<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>My portfolio</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #111827;
        --primary: #7c4dff;
        --text: #e8eef7;
        --muted: #7c4dff;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        background-color: var(--bg);
        color: var(--text);
        font-family:
          "apple-system", "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell",
          "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .pofocard {
        display: flex;
        flex-direction: column;
        width: 60%;
        height: 50%;
        border: #7c4dff solid 1px;
        border-radius: 10px;
      }

      .portfolionav {
        display: flex;
        flex-direction: row;

        height: 100px;
        align-items: center;
        flex-wrap: wrap;
      }
      .header > i {
        margin-right: 10px;
        margin-left: 10px;
        font-size: 25px;
      }
      .header {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        flex-direction: row;
      }
      .title {
        display: flex;
        justify-content: space-between;

        margin-left: 50px;
        margin-right: 10px;
      }
      .title > a {
        position: relative;
        margin-right: 10px;
        margin-left: 10px;
        text-decoration: none;
        color: var(--text);
        transition: 0.3s;
      }
      @media (max-width: 768px) {
        .title > a {
          display: flex;
          flex-direction: column;
          margin-left: 0;
          flex-wrap: wrap;
          font-size: 0.6rem;
        }
      }

      .title > a:hover {
        color: var(--muted);
      }
      .aa::after {
        background-color: #704dff;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        content: "";
        position: absolute;
        bottom: -12px;
        left: 50%;
        transform: translateX(-50%);
        transition: 0.3s;
      }
      @media (max-width: 768px) {
        .aa::after {
          background-color: #704dff;
          width: 5px;
          height: 5px;
          border-radius: 50%;
          content: "";
          position: absolute;
          bottom: -5px;
          left: 50%;
          transform: translateX(-50%);
          transition: 0.3s;
        }
      }

      .cvdownloadbtn {
        margin-left: auto;
        margin-right: 10px;
      }
      .cvdownloadbtn button {
        display: flex;

        border: solid 1px #7c4dff;
        border-radius: 5px;
        padding: 10px;
        background-color: transparent;
        color: var(--text);
        transition: 0.3s;
      }
      @media (max-width: 768px) {
        .cvdownloadbtn button {
          display: flex;
          margin-left: 0;
          object-fit: cover;

          font-size: 0.6rem;
          width: 80px;
          height: 40px;
        }
      }
      .cvdownloadbtn button:hover {
        background-color: #704dff;
        cursor: pointer;

        transform: translateX(-15px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      }
      .card-articles {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        height: auto;
      }
      .cardinfo {
        display: flex;
        flex-direction: column;

        align-items: flex-start;
        margin-left: 30px;
        margin-right: 10px;
        flex: 1;
      }
      .cardinfo > p {
        border: 1px solid #704dff;
        border-radius: 5px;
        font-size: 0.6rem;
        padding: 5px;
        margin-bottom: 10px;
      }
      .cardinfo > em {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .notice-me {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        flex: 1;
      }
      .notice-me article > button {
        display: flex;
        border: solid 1px #7c4dff;
        border-radius: 5px;
        padding: 10px;
        margin-right: 15px;
        color: var(--text);
        transition: 0.3s;
        background-color: transparent;
      }
      .notice-me article > button:hover {
        background-color: var(--primary);
        cursor: pointer;
        transform: translate (-15px);
        box-shadow: 0 10px 20px rgba(184, 142, 142, 0.25);
      }
      @media (max-width: 768px) {
        .notice-me article > button {
          display: flex;
          margin-left: 0;
          object-fit: cover;
          font-size: 0.6rem;
          width: 80px;
          height: 40px;
        }
      }
      .social {
        display: flex;
        margin: 10px 10px 10px 10px;
        justify-content: space-between;
      }
      .social > a {
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        margin-right: 10px;
        color: var(--text);
        transition: 0.3s;
      }
      .social > a:hover {
        color: var(--muted);
      }
      .cardimage::before {
        content: "";

        position: absolute;

        width: 70%;

        aspect-ratio: 1;

        border-radius: 50%;

        background: linear-gradient(#130a22, #3b82f6);

        left: 50%;

        top: 50%;

        transform: translate(-50%, -81%);

        z-index: 1;
      }
      .cardimage {
        display: flex;
        position: relative;
        align-items: center;
        justify-content: center;

        flex: 1;
      }
      .cardimage img {
        width: 75%;

        max-width: 420px;

        object-fit: cover;
        z-index: 3;
      }
      .orbit {
        position: absolute;

        width: min(90%, 600px);

        aspect-ratio: 2 / 1;

        border: 2px solid rgba(168, 85, 247, 0.25);

        border-radius: 50%;

        top: 55%;

        left: 52%;

        transform: translate(-50%, -111%) rotate(-20deg);

        z-index: 2;
      }
    </style>
  </head>

  <body>
    <div class="pofocard">
      <nav class="portfolionav">
        <div class="header">
          <i class="fas fa-code" style="color: var(--primary)"></i>
          <h1><tile>RozanDev</tile></h1>
        </div>
        <div class="title">
          <a href="#" class="aa">Home</a>
          <a href="#">About</a>
          <a href="#">Skills</a>
          <a href="#">Projects</a>
          <a href="#">Contact</a>
        </div>
        <div class="cvdownloadbtn">
          <button>
            <p>DownLoadCV</p>
            <i class="fas fa-download"></i>
          </button>
        </div>
      </nav>
      <section class="card-articles">
        <div class="cardinfo">
          <p>Frontend Developer</p>

          <em
            >Hi, I'm <strong style="color: #704dff">Rozan</strong>,<br />
            I build modern <br />web experiences.</em
          >
          <p style="border: 0">
            I am a passionate fronted developer focused on <br />
            building responsive and user friendly websites.
            <br />let's build something amazing together!
          </p>

          <section class="notice-me">
            <article>
              <button>
                View My Work<i
                  class="fas fa-arrow-right"
                  style="color: var(--primary)"
                ></i>
              </button>
            </article>
            <article>
              <button>
                Contact Me<i
                  class="fas fa-envelope"
                  style="color: var(--primary)"
                ></i>
              </button>
            </article>
          </section>
          <div class="social">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
          </div>
        </div>
        <div class="cardimage">
          <div class="orbit"></div>
          <img src="images/hero.png" alt="RozanDev" />
        </div>
      </section>
    </div>
  </body>
</html>
