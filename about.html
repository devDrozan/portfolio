<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>About us</title>
    <style>
      :root {
        --bg: #0f1419;
        --text: #e8eef7;
      }
      .flex-col {
        display: flex;
        flex-direction: column;
      }
      .flex-row {
        display: flex;
        flex-direction: row;
      }
      .glass {
        background-color: rgba(255, 255, 255, 0.08); /* to change glass*/
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 8px 32px 0 rgba(0, 0, 0.12),
          inset 0 1px rgba(255, 255, 255, 0.25);
      }
      .login-form {
        align-items: flex-start;
        align-content: center;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, blue, green);
        border-radius: 10px;
      }
      a {
        color: black;
      }
      a:hover {
        color: red;
      }
      a:visited {
        color: yellow;
      }
      a:active {
        color: green;
      }
    </style>
  </head>
  <body>
    <form class="login-form glass flex-col">
      <label for="name"> Your Name</label><input type="text" id="name" />
      <label for="pwd">Password</label><input type="password" id="pwd" />
      <input type="submit" value="login" />
      <label for="gender"> Your Gender</label
      ><select id="gender">
        <option value="default">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
      <label for="address">Your Address</label>
      <textarea id="address"></textarea>
      <button type="submit" value="summit">summit</button>
    </form>
    <a href="#one">Link One</a>
    <a href="#two">Link Two</a>
    <div class="alert alert-success">Successfully completed something</div>
    <div class="alert alert-primary">Primary alert</div>
    <div class="alert alert-secondary">Secondary alert</div>
    <div class="alert alert-danger">Danger alert</div>
    <div class="alert alert-light">Light alert</div>
    <div class="alert alert-dark">Dark alert</div>
    <div class="alert alert-warning">Warning alert</div>
    <div class="alert alert-info">Info alert</div>
    <ul class="list-group">
      <li class="list-group-item">Item One</li>
      <li class="list-group-item active">Item Two</li>
      <li class="list-group-item">Item Three</li>
      <li class="list-group-item">Item Four</li>
      <li class="list-group-item">Item Five</li>
    </ul>
  </body>
</html>
